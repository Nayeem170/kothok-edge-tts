name: Token Health Check

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 08:00 UTC
  workflow_dispatch: {} # Manual trigger

jobs:
  check-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run live synthesis test
        id: synth
        continue-on-error: true
        run: cargo test --test token_rotation -- --ignored --nocapture

      - name: Create issue on failure
        if: steps.synth.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Token rotation detected - SEC_MS_GEC_VERSION is stale (${date})`,
              body: [
                'The daily token health check failed. Microsoft has rotated `SEC_MS_GEC_VERSION`.',
                '',
                '## Fix steps',
                '',
                '1. Check the latest value: https://github.com/rany2/edge-tts/blob/master/src/edge_tts/constants.py',
                '2. Update `SEC_MS_GEC_VERSION` in `src/auth.rs`',
                '3. Bump the crate version in `Cargo.toml`',
                '4. `cargo publish`',
                '5. Close this issue',
                '',
                '## Workflow run',
                '',
                `[View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
              labels: ['token-rotation'],
            });

      - name: Fail the job
        if: steps.synth.outcome == 'failure'
        run: exit 1
